<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" role="img" aria-label="Sparkle the friendly star wizard mascot">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE08A"/>
      <stop offset="100%" stop-color="#FFB5A7"/>
    </linearGradient>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8A6E4"/>
      <stop offset="100%" stop-color="#8E7CC3"/>
    </linearGradient>
  </defs>
  <!-- cape -->
  <ellipse cx="150" cy="260" rx="80" ry="30" fill="#A8D8F0" opacity="0.6"/>
  <!-- body: big star -->
  <path fill="url(#body)" stroke="#fff" stroke-width="4" d="M150 60 L172 128 L244 128 L186 170 L208 238 L150 198 L92 238 L114 170 L56 128 L128 128 Z"/>
  <!-- face -->
  <circle cx="128" cy="150" r="10" fill="#5B4B8A"/>
  <circle cx="172" cy="150" r="10" fill="#5B4B8A"/>
  <circle cx="131" cy="147" r="3" fill="#fff"/>
  <circle cx="175" cy="147" r="3" fill="#fff"/>
  <path d="M122 172 Q150 196 178 172" stroke="#5B4B8A" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="108" cy="165" r="8" fill="#FF9FB2" opacity="0.7"/>
  <circle cx="192" cy="165" r="8" fill="#FF9FB2" opacity="0.7"/>
  <!-- wizard hat -->
  <path fill="url(#hat)" d="M150 10 L190 90 L110 90 Z"/>
  <circle cx="150" cy="8" r="10" fill="#FFD66B"/>
  <rect x="100" y="86" width="100" height="14" rx="7" fill="#8E7CC3"/>
  <!-- wand arm -->
  <rect x="220" y="150" width="8" height="70" rx="4" fill="#8E7CC3" transform="rotate(20 220 150)"/>
  <circle cx="255" cy="205" r="10" fill="#FFD66B"/>
  <!-- sparkles -->
  <g fill="#FFD66B">
    <path d="M40 60 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M250 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M260 250 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
  </g>
</svg>
